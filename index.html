<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0d1b3d;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

/* PRESS START */

#pressStart{cursor:pointer;}

.piscar{
animation:piscando 1s infinite;
}

@keyframes piscando{
50%{opacity:0.3;}
}

/* QUIZ */

#quiz{display:none;}

button{
padding:16px;
margin:12px;
border:none;
border-radius:10px;
background:#f4c542;
color:black;
font-size:18px;
cursor:pointer;
width:90%;
max-width:400px;
}

button:active{
transform:scale(0.95);
}

/* PROGRESSO */

#progressBar{
width:100%;
background:#333;
height:10px;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

#progress{
height:100%;
width:0%;
background:#00ffae;
transition:0.5s;
}

/* CONQUISTA */

#achievement{
display:none;
position:fixed;
top:20px;
right:20px;
background:black;
padding:15px;
border-radius:12px;
}

#achievement img{
width:120px;
}

/* EASTER EGG */

#gatoEgg{
width:160px;
cursor:pointer;
margin-top:15px;
}

#segredo{
display:none;
margin-top:10px;
color:#ffd166;
}

/* FINAL */

#final{
display:none;
background:white;
color:black;
padding:25px;
border-radius:15px;
max-width:700px;
max-height:90vh;
overflow-y:auto;
}

#textoFinal{
white-space:pre-line;
line-height:1.6;
}

#gatinhoFinal{
display:none;
margin:auto;
margin-top:20px;
}

/* PRESENTE */

#presenteBox{
display:none;
margin-top:20px;
}

#presenteImg{
width:260px;
opacity:0;
transform:scale(0.8);
transition:all 1.5s ease;
}

#presenteImg.mostrar{
opacity:1;
transform:scale(1);
}

/* FEEDBACK */

#feedbackBox{
display:none;
margin-top:20px;
}

#feedbackTexto{
width:100%;
height:80px;
border-radius:8px;
padding:10px;
}

/* LOADING */

#loadingBox{display:none;}

#loadingBar{
width:100%;
background:#333;
height:10px;
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

#loadingProgress{
height:100%;
width:0%;
background:#00ffae;
transition:1s;
}

</style>
</head>

<body>

<div>

<!-- PRESS START -->

<div id="pressStart" onclick="startGame()">

<h1>Que isso? Um minigame? Aperta Start ai pra ver</h1>

<p class="piscar">PRESS START</p>

<img id="gatoEgg"
src="https://media.tenor.com/ZunkrTKhWb0AAAAj/kimchi-foxiekt.gif"
onclick="easterEgg(event)">

<p id="segredo">Opa! O que é isso? Um easter egg? 👀💖</p>

<div id="spotifyEgg" style="display:none;margin-top:15px;">
<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/3PlKQNlbL4767rND3HnqSI"
width="300"
height="80"
frameborder="0">
</iframe>
</div>

</div>

<!-- QUIZ -->

<div id="quiz">

<div id="progressBar">
<div id="progress"></div>
</div>

<h2 id="pergunta"></h2>

<div id="respostas"></div>

<div id="loadingBox">

<h2 id="loadingTexto"></h2>

<div id="loadingBar">
<div id="loadingProgress"></div>
</div>

</div>

</div>

<!-- CONQUISTA -->

<div id="achievement">
<h3 id="achTitle"></h3>
<img id="achGif">
</div>

<!-- FINAL -->

<div id="final">

<h2>🏆 PLATINA DESBLOQUEADA</h2>

<button onclick="mostrarCarta()">Resgatar prêmio secreto</button>

<p id="textoFinal"></p>

<img id="gatinhoFinal"
width="220"
src="https://media1.tenor.com/m/93-t4YIycjQAAAAd/doggo-dog.gif">

<!-- PRESENTE -->

<div id="presenteBox">

<h3>Easter Egg desbloqueado! O que será?!</h3>

<p>Acho que você merece uma recompensa...</p>

<img id="presenteImg"
src="https://i.postimg.cc/dV8Pcxdn/IMG-3151.jpg">

<p>Chega de mistérios! Olha a surpresa ai 💝.</p>

</div>

<!-- FEEDBACK -->

<div id="feedbackBox">

<h3>Deixe seu Feedback</h3>

<textarea
id="feedbackTexto"
placeholder="O que você achou do jogo?">
</textarea>

<br><br>

<button onclick="enviarFeedback()">Enviar feedback</button>

<p id="msgFeedback"></p>

</div>

</div>

</div>

<audio id="som">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-game-achievement-610.mp3">
</audio>

<script>

/* EMBARALHAR */

function embaralhar(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

/* EASTER EGG INICIO */

function easterEgg(e){

e.stopPropagation();

document.getElementById("segredo").style.display="block";
document.getElementById("spotifyEgg").style.display="block";

}

/* START */

function startGame(){

document.getElementById("pressStart").style.display="none";
document.getElementById("quiz").style.display="block";

mostrarPergunta();

}

/* PERGUNTAS */

const perguntas=[

{
q:"Questão 1 – O que eu (Anna) mais gosto de fazer quando preparo uma surpresa para você?",
op:["Aprontar.","Te tirar um sorriso.","Fazer você ficar bobinha.","Fazer você se sentir feliz e amada.","Todas as alternativas acima."],
certa:4,
conquista:"Aprontona Iniciante",
gif:"https://media1.tenor.com/m/U2GZkWxTylQAAAAC/kitten-dance.gif"
},

{
q:"Questão 2 – Qual banda/artista nos uniu e qual música dessa banda/artista MAIS me lembra você?",
op:["Linkin Park – Waiting for the End","Demi Lovato – Holy Fvck","Paramore – Hate to see your heart break","Alceu Valença – Flor de Tangerina","Kid Abelha - Lágrimas e Chuva"],
certa:2,
conquista:"Aprontona Musical",
gif:"https://media1.tenor.com/m/IPvK5n4RNw0AAAAC/pet-music.gif"
},

{
q:"Questão 3 – Qual desses jogos aqui foi o que começou de fato todas as brincadeiras bobas e gostosas do nosso trelelê?",
op:["Dark Souls","God of War","The Last of Us Part 2","Mario","Uncharted"],
certa:2,
conquista:"Aprontona Gamer",
gif:"https://media1.tenor.com/m/9MyTRyvw8LEAAAAd/gaming-cat.gif"
},

{
q:"Questão 4 – Qual dia eu abri meu coração pra você sobre meus sentimentos?",
op:["10/01/26","05/02/26","27/11/25","10/12/25","12/02/26"],
certa:3,
conquista:"Aprontona Emocionada",
gif:"https://media1.tenor.com/m/td08jkIW7BsAAAAd/kira1310-rizz.gif"
},

{
q:"Questão 5 – Qual dessas coisas a Anna definitivamente faria?",
op:[
"Programar um jogo inteiro só pra te fazer sorrir.",
"Aprontar mais uma surpresa semana que vem.",
"Fazer você rir de algo completamente bobo.",
"Te lembrar todos os dias o quanto você é especial.",
"Sei não hein, acho que todas as alternativas hehe."
],
certa:4,
conquista:"Aprontona Profissional",
gif:"https://media1.tenor.com/m/cKpndeTs1I0AAAAd/cute-cat.gif"
},

{
q:"Questão Final – Quem conquistou o coração da Anna?",
op:[
"A Kika.",
"Uma belíssima morena de olhos castanhos de Recife.",
"Você.",
"Eu já mencionei uma moça de olhos castanhos?!",
"Talvez todas as alternativas hehe."
],
certa:4,
conquista:"🏆 PLATINA",
gif:"https://media1.tenor.com/m/7a7NOeiN2RwAAAAC/cat-love.gif"
}

];

let atual=0;

/* PERGUNTA */

function mostrarPergunta(){

if(atual>=perguntas.length){
mostrarDramaFinal();
return;
}

const p=perguntas[atual];

document.getElementById("pergunta").innerText=p.q;

const area=document.getElementById("respostas");
area.innerHTML="";

const opcoes=p.op.map((texto,i)=>({texto,i}));

embaralhar(opcoes);

opcoes.forEach(opcao=>{
const btn=document.createElement("button");
btn.innerText=opcao.texto;
btn.onclick=()=>responder(opcao.i);
area.appendChild(btn);
});

atualizarProgresso();

}

/* RESPOSTA */

function responder(i){

if(i===perguntas[atual].certa){

mostrarConquista();

atual++;

setTimeout(mostrarPergunta,2200);

}else{

alert("❌ Oh noooous... game over 😓");

location.reload();

}

}

function atualizarProgresso(){

const progresso=(atual/perguntas.length)*100;

document.getElementById("progress").style.width=progresso+"%";

}

/* CONQUISTA */

function mostrarConquista(){

document.getElementById("som").play();

const ach=document.getElementById("achievement");

document.getElementById("achTitle").innerText=
"Conquista desbloqueada: "+perguntas[atual].conquista;

document.getElementById("achGif").src=
perguntas[atual].gif;

ach.style.display="block";

setTimeout(()=>ach.style.display="none",2000);

}

/* DRAMA FINAL */

function mostrarDramaFinal(){

document.getElementById("quiz").style.display="none";
document.getElementById("loadingBox").style.display="block";

const frases=[
"Verificando banco de dados emocional...",
"Analisando nível de conhecimento sobre nós...",
"Consultando registros de momentos fofos...",
"Confirmando que você lembra de tudo...",
"Resultado encontrado..."
];

let i=0;

const texto=document.getElementById("loadingTexto");
const barra=document.getElementById("loadingProgress");

function proximo(){

if(i<frases.length){

texto.innerText=frases[i];

barra.style.width=((i+1)/frases.length)*100+"%";

i++;

setTimeout(proximo,1200);

}else{

setTimeout(mostrarPlatina,1000);

}

}

proximo();

}

function mostrarPlatina(){

document.getElementById("loadingBox").style.display="none";
document.getElementById("final").style.display="block";

}

/* CARTA */

function mostrarCarta(){

const texto=`Parabéns jogadora, você conseguiu gabaritar todo o game e como recompensa, aqui teremos uma nota especial da desenvolvedora do game para você.

Ora, ora, ora, não é que a minha morena de belos olhos castanhos conseguiu platinar o meu game?! Só tendo os olhos MAIS LINDOS e BRILHANTES desse mundo para gabaritar tudo hehe. Estou um pouco quanto emocionada, você respondeu tudo certinho, o que significa que tu se lembra de tudo sobre nós, tal qual eu lembro de tudin, apesar de ter uma péssima memória, tudo o que vem de você sempre fica na minha mente. 

Novamente eu aprontei com programação, tudo para conquistar seu belo coração, ih rapaz, rimei rs. Mas é uma delicia trabalhar nesses aprontamentos só pra saber que no final das contas eu irei conseguir tirar um sorriso (às vezes até um choro kkk) da mina que eu gosto. 

Meu bem, não sei o que acontece comigo, mas quando se trata de você e principalmente de nós eu sempre quero de alguma forma demonstrar carinho, por isso os aprontamentos quase que semanais kkkk. Mas eu não resisto aprontar de certa forma contigo, bons aprontamentos, obviamente. 

Agora como bônus do bônus, aqui vai uma dica de um tal presente que eu comprei pra você, que será entregue em mões, a dica é ‘você me diz que eu sou luz, seria eu a luz da sua animação preferida?!’, ficou meio complicada essa dica, mas você vai catar, eu tenho certeza! 

Obs: O que eu não apronto por essa belíssima mulher do sotaque mais gostoso do mundo and belíssimos olhos castanhos, invento até de ser desenvolvedora de games por ela, apronto mais do que o normal, não tem como, acho que ela me conquistou, não tem jeito. 

Bom, a gente se vê em breve em um novo aprotamento ou pessoalmente recebendo esse presente, não seeeei, joguei no ar hehe 💖.

Beijinhos da sua dev de Brasília, Anna.`;

/* DIGITAÇÃO */

let i=0;

const el=document.getElementById("textoFinal");

function digitar(){

if(i<texto.length){

el.textContent+=texto.charAt(i);

i++;

setTimeout(digitar,30);

}else{

document.getElementById("gatinhoFinal").style.display="block";

setTimeout(()=>{

document.getElementById("presenteBox").style.display="block";

setTimeout(()=>{
document.getElementById("presenteImg").classList.add("mostrar");
},800);

},800);

document.getElementById("feedbackBox").style.display="block";

}

}

digitar();

}

/* FEEDBACK */

function enviarFeedback(){

const texto=document.getElementById("feedbackTexto").value;

if(texto.trim()===""){
alert("Poxa, cadê meu feedback? 😭");
return;
}

document.getElementById("msgFeedback").innerText="Feedback recebido ❤️";

}

</script>

</body>
</html>
